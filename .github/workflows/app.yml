name: app

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'app/**'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
      - '.github/workflows/app.yml'

# Cancel superseded runs on the same branch so PRs don't stack pipelines.
concurrency:
  group: app-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint + typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.15.1'
      - name: Enable corepack
        run: corepack enable && corepack prepare pnpm@9.15.0 --activate
      - uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-
      - run: pnpm install --frozen-lockfile
      - run: pnpm -F app typecheck
      - run: pnpm -F app lint
      - run: pnpm -F app format:check

  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.15.1'
      - name: Enable corepack
        run: corepack enable && corepack prepare pnpm@9.15.0 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm -F app test

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.15.1'
      - name: Enable corepack
        run: corepack enable && corepack prepare pnpm@9.15.0 --activate
      - run: pnpm install --frozen-lockfile
      # testcontainers spins up an ephemeral Postgres per test file. Docker is
      # pre-installed on ubuntu-latest runners.
      - run: pnpm -F app test:integration
        env:
          TESTCONTAINERS_RYUK_DISABLED: 'true'

  constitutional:
    name: Constitutional tests (merge-blocking)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.15.1'
      - name: Enable corepack
        run: corepack enable && corepack prepare pnpm@9.15.0 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm -F app test:constitutional
        env:
          TESTCONTAINERS_RYUK_DISABLED: 'true'
