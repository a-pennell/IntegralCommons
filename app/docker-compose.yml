# CommonGround self-host bundle. Three services: app, postgres, mailhog.
# Production self-hosters swap `mailhog` for their own SMTP via SmtpAdapter (see app/.env.example).

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: commonground
      POSTGRES_PASSWORD: commonground
      POSTGRES_DB: commonground
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U commonground -d commonground']
      interval: 5s
      timeout: 5s
      retries: 10

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - '1025:1025' # SMTP
      - '8025:8025' # web UI

  app:
    build:
      context: .
      dockerfile: Dockerfile
    command: ['node_modules/.bin/next', 'start']
    environment:
      DATABASE_URL: postgres://commonground:commonground@postgres:5432/commonground
      EMAIL_ADAPTER: mailhog
      MAILHOG_HOST: mailhog
      MAILHOG_PORT: '1025'
      SESSION_SECRET: ${SESSION_SECRET:-dev-only-insecure-session-secret-change-me}
      NODE_ENV: production
      PORT: '3000'
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
      mailhog:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ['node_modules/.bin/tsx', 'src/server/jobs/worker.ts']
    environment:
      DATABASE_URL: postgres://commonground:commonground@postgres:5432/commonground
      EMAIL_ADAPTER: mailhog
      MAILHOG_HOST: mailhog
      MAILHOG_PORT: '1025'
      SESSION_SECRET: ${SESSION_SECRET:-dev-only-insecure-session-secret-change-me}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      mailhog:
        condition: service_started

volumes:
  postgres-data:
